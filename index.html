<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>馬券ビューア</title>
    <style>
        :root {
            --paper: #FAF6EC;
            --paper-edge: #EFE8D6;
            --ink: #1A1A1A;
            --ink-soft: #3a3a3a;
            --ink-faint: #888;
            --aqua: #7EC8E3;
            --aqua-deep: #5fb6d6;
            --aqua-soft: #b6dfee;
            --wm: rgba(94, 170, 196, 0.22);
            --bg: #0c0d10;
            --bg-soft: #15171c;
            --ticket-ratio: 1.65;
            /* w / h — landscape JRA ratio */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            color: #fff;
            font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: geometricPrecision;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ====== APP SHELL ====== */
        .app {
            position: fixed;
            top: var(--topoff);
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ====== HEADER ====== */
        .hdr {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 10px 16px 6px;
            color: #cdd2dc;
        }

        .hdr-date {
            font-size: 13px;
            letter-spacing: 0.04em;
            font-feature-settings: "palt";
        }

        .hdr-total {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-feature-settings: "tnum";
        }

        .hdr-total .lbl {
            font-size: 10px;
            color: #7f8696;
            letter-spacing: 0.12em;
        }

        .hdr-total .yen {
            font-size: 15px;
            font-weight: 600;
            color: #e9ecf2;
            font-variant-numeric: tabular-nums;
        }

        .hdr-total .yen .unit {
            font-size: 11px;
            margin-left: 1px;
            color: #9aa1b0;
        }

        /* ====== STAGE ====== */
        .stage {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .track {
            position: absolute;
            inset: 0;
            display: flex;
            transition: transform 250ms ease;
            will-change: transform;
        }

        /* race slide — vertical column of landscape tickets */
        .slide {
            flex: 0 0 100%;
            height: 100%;
            padding: 6px 12px 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            gap: 8px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .slide::-webkit-scrollbar {
            display: none;
        }

        .slide.tight {
            justify-content: flex-start;
            padding-top: 10px;
        }

        /* race-level meta strip above tickets */
        .race-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #9aa1b0;
            font-size: 11px;
            padding: 0 2px 4px;
            font-feature-settings: "tnum";
            flex: 0 0 auto;
        }

        .race-meta .left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .race-meta .right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .race-meta .race-tag {
            color: #cdd2dc;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.06em;
        }

        .race-meta .post {
            color: #cdd2dc;
            font-weight: 600;
        }

        .race-meta .course {
            color: #7f8696;
        }

        /* ====== TICKET ====== */
        .ticket {
            position: relative;
            width: 100%;
            aspect-ratio: var(--ticket-ratio) / 1;
            flex: 0 0 auto;
            background: var(--paper);
            color: var(--ink);
            border-radius: 3px;
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.04),
                0 8px 16px -6px rgba(0, 0, 0, 0.55),
                0 18px 36px -12px rgba(0, 0, 0, 0.55);
            overflow: hidden;
            display: grid;
            grid-template-columns: 108px 60px 1fr;
            grid-template-rows: 1fr;
            font-feature-settings: "palt";
        }

        /* paper grain — horizontal stripes (like thermal-printed JRA ticket) */
        .ticket::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(800px 400px at 30% -10%, rgba(0, 0, 0, 0.035), transparent 60%),
                repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.022) 0 1px, transparent 1px 2px),
                repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.008) 0 1px, transparent 1px 5px);
            mix-blend-mode: multiply;
            opacity: var(--grain, 1);
            z-index: 1;
        }

        /* outer paper edge */
        .ticket::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
            border-radius: 3px;
            z-index: 3;
        }

        /* watermark layer */
        .wm {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: var(--wm-opacity, 1);
            z-index: 1;
        }

        .wm svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ====== LEFT COLUMN ====== */
        .t-col-left {
            position: relative;
            z-index: 2;
            padding: 8px 6px 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .t-yymd {
            font-size: 10px;
            color: #000;
            letter-spacing: 0.02em;
            font-feature-settings: "tnum";
            line-height: 1.1;
        }

        .t-venue-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .t-venue {
            font-size: 26px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0;
            color: #000;
            display: inline-flex;
            align-items: baseline;
            gap: 2px;
            font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
        }

        .t-venue-dow {
            font-size: 11px;
            font-weight: 700;
            color: #000;
        }

        .t-race {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .t-race-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 26px;
            padding: 0 6px;
            background: #000;
            color: #fff;
            border-radius: 1px;
            font-size: 18px;
            font-weight: 900;
            font-feature-settings: "tnum";
            line-height: 1;
        }

        .t-race-suffix {
            font-size: 12px;
            font-weight: 700;
            color: #000;
            letter-spacing: 0.02em;
        }

        .t-left-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            color: #000;
            font-size: 10px;
            line-height: 1.25;
        }

        .t-left-bottom .post-time {
            font-weight: 800;
            font-size: 11px;
            font-feature-settings: "tnum";
        }

        .t-left-bottom .course {
            color: #3a3a3a;
        }

        .t-left-bottom .status {
            margin-top: 2px;
        }

        /* ====== BAND (center vertical) ====== */
        .band {
            position: relative;
            z-index: 2;
            align-self: stretch;
            margin: 8px 0 8px;
            background: var(--aqua);
            background-image:
                repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.22) 0 1px, transparent 1px 5px),
                linear-gradient(180deg, var(--aqua-soft) 0%, var(--aqua) 14%, var(--aqua) 86%, var(--aqua-soft) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            box-shadow: inset 0 0 0 1.4px #000;
        }

        .band-en {
            font-family: "Helvetica Neue", "Arial Narrow", sans-serif;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #000;
            text-align: center;
            line-height: 1;
            background: #fff;
            padding: 3px 4px 2px;
        }

        .band-kanji-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            color: #000;
            padding: 6px 0;
            width: 100%;
        }

        .band-kanji {
            font-weight: 900;
            line-height: 1;
            color: #000;
            font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height: 100%;
            font-size: 28px;
        }

        .band-kanji span {
            display: block;
            line-height: 1;
        }

        .band-kanji.stack-3 {
            font-size: 19px;
        }

        /* ====== RIGHT COLUMN ====== */
        .t-col-right {
            position: relative;
            z-index: 2;
            padding: 8px 10px 6px 10px;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* BOX tag at top-right area */
        .box-banner {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 2px;
        }

        .box-tag-big {
            display: inline-flex;
            align-items: center;
            border: 1.6px solid #000;
            padding: 2px 10px 3px 8px;
            font-size: 14px;
            font-weight: 900;
            color: #000;
            letter-spacing: 0.04em;
            border-radius: 2px;
            background: transparent;
        }

        .box-tag-small {
            font-family: "Helvetica Neue", "Arial Narrow", sans-serif;
            font-size: 10px;
            font-weight: 800;
            color: #000;
            letter-spacing: 0.1em;
        }

        /* entries area (flex grows; footer at bottom) */
        .entries {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            min-width: 0;
        }

        /* TANSHO entry: umaban + horse name + amount */
        .entry {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .entry-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .entry-amount-row {
            display: flex;
            justify-content: flex-end;
            align-items: baseline;
        }

        .umaban {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 26px;
            border: 1.6px solid #000;
            background: transparent;
            font-size: 18px;
            font-weight: 900;
            font-feature-settings: "tnum";
            line-height: 1;
            border-radius: 1px;
            flex: 0 0 auto;
        }

        .horse-name {
            font-size: 15px;
            font-weight: 700;
            color: #000;
            letter-spacing: 0.005em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        }

        .amount {
            display: inline-flex;
            align-items: baseline;
            gap: 3px;
            font-family: "Hiragino Kaku Gothic ProN", "Helvetica Neue", sans-serif;
            color: #000;
            font-feature-settings: "tnum";
            white-space: nowrap;
        }

        .amount .stars {
            color: #000;
            font-size: 11px;
            letter-spacing: 0.02em;
            opacity: 0.85;
        }

        .amount .num {
            font-size: 19px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }

        .amount .yen-mark {
            display: inline-block;
            font-size: 9px;
            border: 1.4px solid #000;
            padding: 1px 3px 1px;
            margin-left: 3px;
            border-radius: 1px;
            font-weight: 700;
        }

        /* BOX entries — numbers row + stars row */
        .combo-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 6px;
            align-items: center;
            margin-bottom: 2px;
        }

        .combo-numbers .umaban {
            width: 28px;
            height: 24px;
            font-size: 16px;
        }

        .combo-numbers .stargap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 24px;
            font-size: 14px;
            color: #000;
            opacity: 0.7;
        }

        .combo-horses {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 8px;
            font-size: 9.5px;
            color: #3a3a3a;
            margin-bottom: 4px;
        }

        .combo-horses .it {
            display: inline-flex;
            gap: 2px;
            align-items: baseline;
            white-space: nowrap;
        }

        .combo-horses .it b {
            color: #000;
            font-weight: 800;
            font-feature-settings: "tnum";
        }

        .combo-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 10px;
            color: #000;
        }

        .combo-meta .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
        }

        .combo-meta .k {
            color: #3a3a3a;
            letter-spacing: 0.04em;
        }

        .combo-meta .v {
            color: #000;
            font-weight: 800;
            font-feature-settings: "tnum";
        }

        .combo-meta .v .stars {
            font-size: 10px;
            opacity: 0.7;
            margin-right: 2px;
        }

        .combo-meta .v .num {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .combo-meta .v .yen-mark {
            display: inline-block;
            font-size: 8px;
            border: 1.2px solid #000;
            padding: 0px 2px;
            margin-left: 2px;
            border-radius: 1px;
            font-weight: 700;
        }

        /* ====== TICKET FOOTER (per-ticket totals) ====== */
        .t-foot {
            margin-top: 6px;
            padding-top: 5px;
            border-top: 1px dashed rgba(0, 0, 0, 0.22);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 6px;
            color: #000;
            font-size: 10px;
        }

        .t-foot .lbl {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.14em;
        }

        .t-foot .total {
            display: inline-flex;
            align-items: baseline;
            gap: 3px;
        }

        .t-foot .total .stars {
            font-size: 11px;
            color: #000;
            opacity: 0.65;
            letter-spacing: 0.04em;
        }

        .t-foot .total .num {
            font-size: 15px;
            font-weight: 800;
            font-feature-settings: "tnum";
        }

        .t-foot .total .unit {
            font-size: 9px;
            margin-left: 1px;
            font-weight: 700;
        }

        /* status chip */
        .chip-upcoming {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 4px;
            border-radius: 1px;
            background: #000;
            color: var(--aqua);
            font-size: 8px;
            letter-spacing: 0.12em;
            font-weight: 800;
        }

        .chip-finished {
            background: #777;
            color: #fff;
        }

        .chip-live {
            background: #000;
            color: #fff;
        }

        .chip-live::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--aqua);
            margin-right: 3px;
            box-shadow: 0 0 4px var(--aqua);
        }

        /* ====== NAV DOTS ====== */
        .nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 8px 16px 12px;
            flex: 0 0 auto;
        }

        .nav .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3a3f4a;
            transition: transform 200ms ease, background 200ms ease, width 200ms ease;
            cursor: pointer;
        }

        .nav .dot.on {
            background: var(--aqua);
            width: 22px;
            border-radius: 4px;
        }

        .nav .dot.past {
            background: #2a2d34;
            opacity: 0.55;
        }

        /* ====== EMPTY ====== */
        .empty {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9aa1b0;
            gap: 14px;
            text-align: center;
            padding: 0 30px;
        }

        .empty .ic {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 1.5px dashed #3a3f4a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a6172;
            font-size: 24px;
        }

        .empty .ti {
            font-size: 16px;
            color: #cdd2dc;
        }

        .empty .sub {
            font-size: 12px;
            color: #7f8696;
            letter-spacing: 0.04em;
        }

        /* ====== TIME PILL ====== */
        .clock {
            position: absolute;
            left: 50%;
            bottom: calc(env(safe-area-inset-bottom) + 44px);
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(20, 22, 28, 0.78);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #cdd2dc;
            font-size: 11px;
            font-feature-settings: "tnum";
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
            opacity: 0;
            transition: opacity 200ms ease;
        }

        .clock.show {
            opacity: 1;
        }

        .clock .dotlive {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7EC8E3;
            box-shadow: 0 0 8px #7EC8E3;
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        /* ===== TWEAKS PANEL ===== */
        .tw-fab {
            position: fixed;
            right: 14px;
            bottom: calc(env(safe-area-inset-bottom) + 14px);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #1c1f26;
            border: 1px solid #2a2e38;
            color: #cdd2dc;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .tw-fab.on {
            display: flex;
        }

        .tw-fab svg {
            width: 18px;
            height: 18px;
        }

        .tw {
            position: fixed;
            right: 10px;
            bottom: calc(env(safe-area-inset-bottom) + 60px);
            width: 260px;
            background: #15171c;
            border: 1px solid #262932;
            border-radius: 12px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
            color: #cdd2dc;
            font-size: 12px;
            padding: 12px;
            z-index: 60;
            display: none;
        }

        .tw.show {
            display: block;
        }

        .tw h3 {
            margin: 0 0 8px;
            font-size: 11px;
            letter-spacing: 0.18em;
            color: #8d94a3;
            font-weight: 700;
        }

        .tw .grp {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tw .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .tw label {
            color: #aab0bc;
            font-size: 11px;
        }

        .tw .seg {
            display: flex;
            background: #0e1014;
            border: 1px solid #262932;
            border-radius: 8px;
            overflow: hidden;
        }

        .tw .seg button {
            flex: 1;
            appearance: none;
            border: none;
            background: transparent;
            color: #9aa1b0;
            padding: 6px 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .tw .seg button.on {
            background: #22262f;
            color: #fff;
        }

        .tw input[type=range] {
            width: 100%;
            accent-color: var(--aqua);
        }

        .tw .close {
            position: absolute;
            top: 6px;
            right: 6px;
            background: transparent;
            border: none;
            color: #7f8696;
            font-size: 14px;
            cursor: pointer;
        }

        .tw select {
            background: #0e1014;
            color: #cdd2dc;
            border: 1px solid #262932;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 11px;
        }

        .tw .ttl-app {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #22262f;
            padding-top: 8px;
            margin-top: 4px;
        }
        /* ===================== 上位タブ & 画面切替 ===================== */
        :root {
            --tabbar-h: 46px;
            --topoff: calc(var(--tabbar-h) + env(safe-area-inset-top));
            --pred-panel: #15171c;
            --pred-panel2: #1b1e25;
            --pred-line: #262a33;
            --pred-text: #e7e9ee;
            --pred-dim: #9aa1b0;
            --pharaoh: #7EC8E3;
            --yoshi: #E7B264;
            --uw: 40px;
            /* 馬番列の幅（馬名列の left もこの値に合わせる） */
        }

    <template id="tplWatermark">

    <script>
        /* ============================================================
         *  KEIBA TICKET VIEWER — iPhone 13, JST, paper ticket aesthetic
         *  v1.1 — one ticket per bet type, landscape aspect ratio
         * ============================================================ */

        const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
            "dataset": "full",
            "simTime": "real",
            "aqua": 100,
            "grain": 80,
            "watermark": 40,
            "autoSkip": "on"
        }/*EDITMODE-END*/;

        let tweaks = Object.assign({}, TWEAK_DEFAULTS);

        /* ---------- JST helpers ---------- */
        function jstDateStr(d = new Date()) {
            return d.toLocaleDateString('en-CA', { timeZone: 'Asia/Tokyo' });
        }
        function jstTimeStr(d = new Date()) {
            return d.toLocaleTimeString('en-GB', { timeZone: 'Asia/Tokyo', hour12: false });
        }
        function simulatedNow() {
            if (tweaks.simTime === 'real') return new Date();
            const today = jstDateStr();
            const map = { pre: '13:50:00', mid: '14:30:00', end: '16:30:00' };
            const t = map[tweaks.simTime] || '13:50:00';
            return new Date(today + 'T' + t + '+09:00');
        }
        function nowHHMM() {
            return simulatedNow().toLocaleTimeString('en-GB', { timeZone: 'Asia/Tokyo', hour12: false }).slice(0, 5);
        }
        function compareHHMM(a, b) { return a.localeCompare(b); }

        /* ---------- formatting ---------- */
        const yen = n => '¥' + (n || 0).toLocaleString('en-US');
        function starsForYen(n) {
            const digits = String(n || 0).length;
            const slots = Math.max(0, 6 - digits);
            return '☆'.repeat(slots);
        }
        function starsForCount(n) {
            const digits = String(n || 0).length;
            const slots = Math.max(0, 4 - digits);
            return '★'.repeat(slots);
        }
        function fmtJPDate(yyyy_mm_dd) {
            const [y, m, d] = yyyy_mm_dd.split('-').map(Number);
            return `${y}年${m}月${d}日`;
        }
        function jpWeekday(yyyy_mm_dd) {
            const [y, m, d] = yyyy_mm_dd.split('-').map(Number);
            const dt = new Date(Date.UTC(y, m - 1, d));
            return ['日', '月', '火', '水', '木', '金', '土'][dt.getUTCDay()];
        }

        /* ---------- dummy data ---------- */
        const DUMMY = {
            date: jstDateStr(),
            generated_at: new Date().toISOString(),
            races: [
                {
                    venue: "中山", race_number: 9, post_time: "14:10",
                    track: "芝", distance: 1600,
                    tansho: [
                        { umaban: 6, horse_name: "ナカヤマブレイブ", amount: 1500, sources: ["L1"] }
                    ],
                    umaren_box: null,
                    wide_box: {
                        members: [6, 11],
                        horse_names: ["ナカヤマブレイブ", "リバーサイド"],
                        combos: 1, amount_per_combo: 800, subtotal: 800
                    },
                    total_amount: 2300
                },
                {
                    venue: "東京", race_number: 11, post_time: "15:40",
                    track: "芝", distance: 2400,
                    tansho: [
                        { umaban: 3, horse_name: "ステイホーム", amount: 2800, sources: ["L1", "L2"] },
                        { umaban: 7, horse_name: "サンプルホース", amount: 900, sources: ["L1"] }
                    ],
                    umaren_box: {
                        members: [3, 7, 12],
                        horse_names: ["ステイホーム", "サンプルホース", "テストウマ"],
                        combos: 3, amount_per_combo: 900, subtotal: 2700
                    },
                    wide_box: {
                        members: [3, 7, 12],
                        horse_names: ["ステイホーム", "サンプルホース", "テストウマ"],
                        combos: 3, amount_per_combo: 1100, subtotal: 3300
                    },
                    total_amount: 9700
                },
                {
                    venue: "阪神", race_number: 12, post_time: "16:25",
                    track: "ダ", distance: 1200,
                    tansho: [
                        { umaban: 14, horse_name: "ハンシンサンダー", amount: 1200, sources: ["L2"] }
                    ],
                    umaren_box: null, wide_box: null,
                    total_amount: 1200
                }
            ],
            grand_total: 13200
        };
        const DUMMY_SINGLE = {
            date: jstDateStr(),
            races: [{
                venue: "東京", race_number: 11, post_time: "15:40",
                track: "芝", distance: 2400,
                tansho: [{ umaban: 3, horse_name: "ステイホーム", amount: 1000, sources: ["L1"] }],
                umaren_box: null, wide_box: null,
                total_amount: 1000
            }],
            grand_total: 1000
        };
        const DUMMY_EMPTY = { date: jstDateStr(), races: [], grand_total: 0 };

        function getDataset() {
            if (tweaks.dataset === 'single') return DUMMY_SINGLE;
            if (tweaks.dataset === 'empty') return DUMMY_EMPTY;
            return DUMMY;
        }

        /* ---------- state ---------- */
        let state = {
            data: null,
            index: 0,
            autoTimer: null,
        };

        const $ = sel => document.querySelector(sel);
        const $$ = sel => Array.from(document.querySelectorAll(sel));

        function renderHeader(data) {
            $('#hdrDate').textContent = fmtJPDate(data.date);
            $('#hdrTotal').innerHTML = `${yen(data.grand_total)}<span class="unit">円</span>`;
        }

        function raceStatus(race) {
            const now = nowHHMM();
            const cmp = compareHHMM(now, race.post_time);
            if (cmp < 0) return 'upcoming';
            if (cmp > 0) return 'finished';
            return 'now';
        }

        /* Build tickets list for a race */
        function ticketsForRace(race) {
            const tickets = [];
            if (race.tansho && race.tansho.length) {
                tickets.push({
                    kind: 'tansho',
                    kanji: '単勝',
                    en_top: 'WIN', en_bot: 'WIN',
                    isBox: false,
                    entries: race.tansho.map(t => ({ umaban: t.umaban, horse_name: t.horse_name, amount: t.amount })),
                    count: race.tansho.length,
                    subtotal: race.tansho.reduce((s, t) => s + (t.amount || 0), 0),
                });
            }
            if (race.umaren_box) {
                const b = race.umaren_box;
                tickets.push({
                    kind: 'umaren',
                    kanji: '馬連',
                    en_top: 'QUINELLA', en_bot: 'QUINELLA',
                    isBox: true,
                    members: b.members, horse_names: b.horse_names,
                    combos: b.combos, per: b.amount_per_combo,
                    subtotal: b.subtotal,
                    count: b.combos,
                });
            }
            if (race.wide_box) {
                const b = race.wide_box;
                tickets.push({
                    kind: 'wide',
                    kanji: 'ワイド',
                    en_top: 'QUINELLA', en_bot: 'PLACE',
                    isBox: true,
                    members: b.members, horse_names: b.horse_names,
                    combos: b.combos, per: b.amount_per_combo,
                    subtotal: b.subtotal,
                    count: b.combos,
                });
            }
            return tickets;
        }

        /* render one ticket card (landscape) */
        function renderTicketCard(race, ticket, idx, raceIdx) {
            const dateStr = state.data.date;
            const dow = jpWeekday(dateStr);
            const status = raceStatus(race);
            const statusChip =
                status === 'now' ? `<span class="chip-upcoming chip-live">LIVE</span>`
                    : status === 'finished' ? `<span class="chip-upcoming chip-finished">FINISHED</span>`
                        : `<span class="chip-upcoming">UPCOMING</span>`;

            const kanjiChars = ticket.kanji.split('');
            const kanjiCls = kanjiChars.length >= 3 ? 'band-kanji stack-3' : 'band-kanji';
            const kanjiHtml = `<div class="${kanjiCls}">${kanjiChars.map(c => `<span>${c}</span>`).join('')}</div>`;

            // right column content
            let rightContent = '';
            if (!ticket.isBox) {
                rightContent = `
      <div class="entries">
        ${ticket.entries.map(e => `
          <div class="entry">
            <div class="entry-name-row">
              <div class="umaban">${e.umaban}</div>
              <div class="horse-name">${e.horse_name}</div>
            </div>
            <div class="entry-amount-row">
              <div class="amount">
                <span class="stars">${starsForYen(e.amount)}</span>
                <span class="num">${(e.amount || 0).toLocaleString('en-US')}</span>
                <span class="yen-mark">円</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
            } else {
                // BOX layout: BOX banner, umaban row with ☆ placeholders to 5 slots, horse names list, then 組合せ/各組/合計
                const slots = 5;
                const filled = ticket.members.length;
                const memberCells = ticket.members.map(m => `<span class="umaban">${m}</span>`).join('');
                const starCells = Array.from({ length: Math.max(0, slots - filled) }).map(() => `<span class="stargap">☆</span>`).join('');
                rightContent = `
      <div class="box-banner">
        <div class="box-tag-big">ボックス</div>
        <div class="box-tag-small">BOX</div>
      </div>
      <div class="entries">
        <div class="combo-numbers">
          ${memberCells}${starCells}
        </div>
        <div class="combo-horses">
          ${ticket.members.map((m, i) => `<span class="it"><b>${m}</b>${ticket.horse_names[i] || ''}</span>`).join('')}
        </div>
        <div class="combo-meta">
          <div class="row">
            <span class="k">組合せ数</span>
            <span class="v"><span class="num">${ticket.combos}</span>通り</span>
          </div>
          <div class="row">
            <span class="k">各組</span>
            <span class="v">
              <span class="stars">${starsForYen(ticket.per)}</span>
              <span class="num">${(ticket.per || 0).toLocaleString('en-US')}</span>
              <span class="yen-mark">円</span>
            </span>
          </div>
        </div>
      </div>`;
            }

            // footer per ticket
            const ticketFoot = `
    <div class="t-foot">
      <span class="lbl">合計</span>
      <div class="total">
        <span class="stars">${starsForCount(ticket.count)}</span>
        <span class="num">${ticket.count}</span><span class="unit">枚</span>
      </div>
      <div class="total">
        <span class="stars">${starsForYen(ticket.subtotal)}</span>
        <span class="num">${(ticket.subtotal || 0).toLocaleString('en-US')}</span><span class="unit">円</span>
      </div>
    </div>`;

            const cardId = `wm-${raceIdx}-${idx}`;
            return `
    <article class="ticket" data-kind="${ticket.kind}">
      <div class="wm" id="${cardId}"></div>

      <div class="t-col-left">
        <div class="t-yymd">${fmtJPDate(dateStr)}</div>
        <div class="t-venue-block">
          <div class="t-venue">${race.venue}<span class="t-venue-dow">(${dow})</span></div>
          <div class="t-race">
            <span class="t-race-badge">${race.race_number}</span>
            <span class="t-race-suffix">レース</span>
          </div>
        </div>
        <div class="t-left-bottom">
          <div class="post-time">${race.post_time} 発走</div>
          <div class="course">${race.track}${race.distance}m</div>
          <div class="status">${statusChip}</div>
        </div>
      </div>

      <div class="band">
        <div class="band-en">${ticket.en_top}</div>
        <div class="band-kanji-wrap">
          ${kanjiHtml}
        </div>
        <div class="band-en">${ticket.en_bot}</div>
      </div>

      <div class="t-col-right">
        ${rightContent}
        ${ticketFoot}
      </div>
    </article>
  `;
        }

        /* build a slide for one race (multiple tickets stacked vertically) */
        function buildSlide(race, idx) {
            const tk = document.createElement('div');
            tk.className = 'slide';
            const tickets = ticketsForRace(race);
            if (tickets.length >= 3) tk.classList.add('tight');

            tk.innerHTML = tickets.map((t, i) => renderTicketCard(race, t, i, idx)).join('');

            // inject watermark SVG into each .wm
            setTimeout(() => {
                const tpl = document.getElementById('tplWatermark');
                tk.querySelectorAll('.wm').forEach(host => {
                    host.appendChild(tpl.content.cloneNode(true));
                });
            }, 0);

            return tk;
        }

        /* ---------- render full ---------- */
        function render() {
            const data = state.data;
            renderHeader(data);

            const track = $('#track');
            track.innerHTML = '';

            if (!data.races || !data.races.length) {
                $('#empty').style.display = 'flex';
                $('#nav').innerHTML = '';
                return;
            } else {
                $('#empty').style.display = 'none';
            }

            data.races.forEach((race, i) => {
                track.appendChild(buildSlide(race, i));
            });

            renderNav();
            applyTransform(false);
        }

        function renderNav() {
            const nav = $('#nav');
            nav.innerHTML = '';
            state.data.races.forEach((r, i) => {
                const d = document.createElement('span');
                d.className = 'dot';
                if (i === state.index) d.classList.add('on');
                if (raceStatus(r) === 'finished' && i !== state.index) d.classList.add('past');
                d.addEventListener('click', () => goTo(i));
                nav.appendChild(d);
            });
        }

        function applyTransform(animate = true) {
            const track = $('#track');
            track.style.transition = animate ? 'transform 250ms ease' : 'none';
            track.style.transform = `translateX(${-state.index * 100}%)`;
            $$('.dot').forEach((d, i) => d.classList.toggle('on', i === state.index));
        }

        function goTo(i, animate = true) {
            if (!state.data.races.length) return;
            state.index = Math.max(0, Math.min(state.data.races.length - 1, i));
            applyTransform(animate);
            renderNav();
        }

        /* ---------- swipe ---------- */
        (function attachSwipe() {
            const stage = $('#stage');
            let sx = 0, sy = 0, dx = 0, dy = 0, t0 = 0, active = false, locked = false;
            stage.addEventListener('touchstart', e => {
                const t = e.touches[0]; sx = t.clientX; sy = t.clientY; dx = 0; dy = 0; t0 = Date.now(); active = true; locked = false;
                $('#track').style.transition = 'none';
            }, { passive: true });
            stage.addEventListener('touchmove', e => {
                if (!active) return;
                const t = e.touches[0]; dx = t.clientX - sx; dy = t.clientY - sy;
                if (!locked) {
                    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                        locked = Math.abs(dy) > Math.abs(dx); // lock vertical → allow native scroll
                    }
                }
                if (!locked) {
                    const w = stage.clientWidth;
                    $('#track').style.transform = `translateX(${(-state.index * 100) + (dx / w * 100)}%)`;
                }
            }, { passive: true });
            stage.addEventListener('touchend', () => {
                if (!active) return; active = false;
                if (locked) { applyTransform(true); return; }
                const w = stage.clientWidth;
                const elapsed = Date.now() - t0;
                if (Math.abs(dx) > 40 || (Math.abs(dx) > 20 && elapsed < 250)) {
                    if (dx < 0) goTo(state.index + 1);
                    else goTo(state.index - 1);
                } else {
                    applyTransform(true);
                }
            });
            // mouse for desktop dev
            let md = false;
            stage.addEventListener('mousedown', e => { md = true; sx = e.clientX; sy = e.clientY; dx = 0; t0 = Date.now(); $('#track').style.transition = 'none'; });
            window.addEventListener('mousemove', e => {
                if (!md) return; dx = e.clientX - sx;
                const w = stage.clientWidth;
                $('#track').style.transform = `translateX(${(-state.index * 100) + (dx / w * 100)}%)`;
            });
            window.addEventListener('mouseup', () => {
                if (!md) return; md = false;
                if (Math.abs(dx) > 40) { if (dx < 0) goTo(state.index + 1); else goTo(state.index - 1); }
                else applyTransform(true);
            });
        })();

        /* ---------- auto-skip ---------- */
        /* 「最も新しく発走時刻に到達したレース」を返す。未到達なら先頭レース。 */
        function pickCurrentIndex() {
            if (!state.data || !state.data.races.length) return 0;
            const now = nowHHMM();
            let idx = 0;
            for (let i = 0; i < state.data.races.length; i++) {
                if (compareHHMM(now, state.data.races[i].post_time) >= 0) idx = i;
            }
            return idx;
        }
        function autoSkipCheck() {
            if (!state.data || !state.data.races.length) return;
            if (tweaks.autoSkip !== 'on') return;
            const target = pickCurrentIndex();
            if (target !== state.index) goTo(target);
        }

        /* ---------- clock ---------- */
        function updateClock() {
            const d = simulatedNow();
            $('#clockText').textContent = d.toLocaleTimeString('en-GB', { timeZone: 'Asia/Tokyo', hour12: false });
        }
        function flashClock() {
            const c = $('#clock');
            c.classList.add('show');
            clearTimeout(flashClock._t);
            flashClock._t = setTimeout(() => c.classList.remove('show'), 1400);
        }

        /* ---------- load ---------- */
        async function load() {
            const today = jstDateStr();
            let data = null;
            try {
                const r = await fetch('data/tickets_' + today.replace(/-/g, '') + '.json?t=' + Date.now(), { cache: 'no-store' });
                if (r.ok) data = await r.json();
            } catch (e) { /* ignore */ }
            state.data = data || { date: today, races: [], grand_total: 0 };
            state.index = pickCurrentIndex();
            render();
            applyTweakStyles();
        }

        /* ---------- tweaks ---------- */
        function applyTweakStyles() {
            const root = document.documentElement;
            const t = (tweaks.aqua || 0) / 100;
            const lerp = (a, b, t) => Math.round(a + (b - a) * t);
            const r = lerp(207, 95, t), g = lerp(233, 182, t), b = lerp(243, 214, t);
            root.style.setProperty('--aqua', `rgb(${r},${g},${b})`);
            const r2 = lerp(220, 182, t), g2 = lerp(240, 223, t), b2 = lerp(248, 238, t);
            root.style.setProperty('--aqua-soft', `rgb(${r2},${g2},${b2})`);
            document.documentElement.style.setProperty('--grain', String(tweaks.grain / 100));
            document.documentElement.style.setProperty('--wm-opacity', String(tweaks.watermark / 100));
        }

        function setTweak(key, value) {
            tweaks[key] = value;
            try {
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
            } catch (e) { }
        }

        function bindTweaks() {
            const tw = $('#tw');
            window.addEventListener('message', e => {
                const d = e.data;
                if (!d || !d.type) return;
                if (d.type === '__activate_edit_mode') {
                    tw.classList.add('show');
                } else if (d.type === '__deactivate_edit_mode') {
                    tw.classList.remove('show');
                }
            });
            try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) { }

            $('#twClose').addEventListener('click', () => {
                tw.classList.remove('show');
                try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) { }
            });

            $('#segDataset').querySelectorAll('button').forEach(b => {
                b.addEventListener('click', () => {
                    $('#segDataset').querySelectorAll('button').forEach(x => x.classList.remove('on'));
                    b.classList.add('on');
                    setTweak('dataset', b.dataset.v);
                    state.data = getDataset();
                    state.index = pickCurrentIndex();
                    render();
                });
            });
            $('#simTime').addEventListener('change', (e) => {
                setTweak('simTime', e.target.value);
                renderNav();
                autoSkipCheck();
                updateClock();
            });
            $('#aquaRange').addEventListener('input', e => { setTweak('aqua', +e.target.value); applyTweakStyles(); });
            $('#grainRange').addEventListener('input', e => { setTweak('grain', +e.target.value); applyTweakStyles(); });
            $('#wmRange').addEventListener('input', e => { setTweak('watermark', +e.target.value); applyTweakStyles(); });
            $('#segAuto').querySelectorAll('button').forEach(b => {
                b.addEventListener('click', () => {
                    $('#segAuto').querySelectorAll('button').forEach(x => x.classList.remove('on'));
                    b.classList.add('on');
                    setTweak('autoSkip', b.dataset.v);
                });
            });

            // sync controls to tweak values
            $('#segDataset').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.v === tweaks.dataset));
            $('#segAuto').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.v === tweaks.autoSkip));
            $('#simTime').value = tweaks.simTime;
            $('#aquaRange').value = tweaks.aqua;
            $('#grainRange').value = tweaks.grain;
            $('#wmRange').value = tweaks.watermark;
        }

        /* ============================================================
         *  予測データ (Predictions) — 競馬場/レース選択・ソート・横スクロール表
         * ============================================================ */
        const predState = {
            data: undefined,   // undefined=未取得, null=失敗, object=取得済
            loading: false,
            venueIdx: 0,
            raceIdx: 0,
            sortKey: 'umaban',
            sortDir: 'asc',
        };

        const PRED_SORTS = [
            { key: 'umaban', label: '馬番', dir: 'asc' },
            { key: 'pharaoh_winrate', label: '勝馬率', dir: 'desc' },
            { key: 'yoshi_winrate', label: '単勝率', dir: 'desc' },
            { key: 'tan_odds', label: '単オ', dir: 'asc' },
            { key: 'tan_ev', label: '単EV', dir: 'desc' },
            { key: 'fuku_ev', label: '複EV', dir: 'desc' },
        ];

        function markHtml(sym) {
            const s = (sym || '').trim();
            if (!s) return '<span class="mk mk-none">·</span>';
            const c = s.startsWith('◎') ? '#ff5a5f'
                : (s.startsWith('◯') || s.startsWith('○')) ? '#ffa94d'
                    : s.startsWith('▲') ? '#4da8ff'
                        : s.startsWith('△') ? '#9aa1b0'
                            : '#6b6f78';
            return `<span class="mk" style="color:${c}">${s}</span>`;
        }

        const predPct = v => (v == null) ? null : Math.round(v * 100);

        function circledNum(n) {
            return (n >= 1 && n <= 20) ? String.fromCharCode(0x2460 + n - 1) : `(${n})`;
        }

        /* 横棒は 0–100% の絶対スケール（正規化しない）。値20% → 幅の1/5。rank=順位(1位=最大値)。 */
        function barHtml(v, cls, rank) {
            if (v == null) return '<span class="bar-na">—</span>';
            const w = Math.min(100, Math.max(0, v * 100));
            const rk = rank
                ? `<span class="bar-rank ${rank <= 3 ? 'r' + rank : 'rx'}">${circledNum(rank)}</span>`
                : '';
            return `<div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${w.toFixed(1)}%"></div>${rk}<span class="bar-val">${predPct(v)}%</span></div>`;
        }

        function currentVenue() {
            const vs = predState.data && predState.data.venues;
            if (!vs || !vs.length) return null;
            return vs[Math.min(predState.venueIdx, vs.length - 1)];
        }
        function currentRace() {
            const v = currentVenue();
            if (!v || !v.races.length) return null;
            return v.races[Math.min(predState.raceIdx, v.races.length - 1)];
        }

        /* 「現在/次レース」= 発走済の最後のレース。未発走なら先頭。 */
        function predPickRaceIdx(races) {
            if (!races || !races.length) return 0;
            const now = nowHHMM();
            let idx = 0;
            for (let i = 0; i < races.length; i++) {
                if (races[i].post_time && compareHHMM(now, races[i].post_time) >= 0) idx = i;
            }
            return idx;
        }

        /* 全競馬場のレースを「発走時刻順」に並べた配列（{vi,ri,...}）。前/次レース移動に使用。 */
        function globalRaceOrder() {
            const list = [];
            ((predState.data && predState.data.venues) || []).forEach((v, vi) => {
                v.races.forEach((r, ri) => {
                    list.push({ vi, ri, post: r.post_time || '99:99', venue: v.venue, rno: r.race_number });
                });
            });
            list.sort((a, b) => a.post.localeCompare(b.post) || a.venue.localeCompare(b.venue) || a.rno - b.rno);
            return list;
        }
        function currentGlobalIdx(order) {
            return order.findIndex(o => o.vi === predState.venueIdx && o.ri === predState.raceIdx);
        }
        /* 発走時刻順で delta だけ移動（競馬場をまたいで遷移）。 */
        function gotoRaceDelta(delta) {
            const order = globalRaceOrder();
            if (!order.length) return;
            let idx = currentGlobalIdx(order);
            if (idx < 0) idx = 0;
            idx = Math.max(0, Math.min(order.length - 1, idx + delta));
            predState.venueIdx = order[idx].vi;
            predState.raceIdx = order[idx].ri;
            renderPredictions();
        }
        function renderRaceNav() {
            const order = globalRaceOrder();
            const idx = currentGlobalIdx(order);
            $('#prevRaceBtn').disabled = (idx <= 0);
            $('#nextRaceBtn').disabled = (idx < 0 || idx >= order.length - 1);
        }

        async function loadPredictions() {
            if (predState.loading) return;
            predState.loading = true;
            renderPredictions();
            const today = jstDateStr();
            let data = null;
            try {
                const r = await fetch('data/predictions_' + today.replace(/-/g, '') + '.json?t=' + Date.now(), { cache: 'no-store' });
                if (r.ok) data = await r.json();
            } catch (e) { /* ignore */ }
            predState.data = data;
            predState.loading = false;
            predState.venueIdx = 0;
            const v = currentVenue();
            predState.raceIdx = v ? predPickRaceIdx(v.races) : 0;
            renderPredictions();
        }

        function renderVenueChips() {
            const host = $('#predVenues');
            const vs = (predState.data && predState.data.venues) || [];
            host.innerHTML = vs.map((v, i) =>
                `<button class="chip${i === predState.venueIdx ? ' on' : ''}" data-i="${i}">${v.venue}</button>`
            ).join('');
            host.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
                predState.venueIdx = +b.dataset.i;
                const v = currentVenue();
                if (!v.races[predState.raceIdx]) predState.raceIdx = predPickRaceIdx(v.races);
                renderPredictions();
            }));
        }

        function renderRaceChips() {
            const host = $('#predRaces');
            const v = currentVenue();
            const races = v ? v.races : [];
            host.innerHTML = races.map((r, i) =>
                `<button class="chip${i === predState.raceIdx ? ' on' : ''}" data-i="${i}">${r.race_number}R</button>`
            ).join('');
            host.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
                predState.raceIdx = +b.dataset.i;
                renderPredictions();
            }));
            const on = host.querySelector('.chip.on');
            if (on) on.scrollIntoView({ inline: 'center', block: 'nearest' });
        }

        function renderSortRow() {
            const host = $('#predSorts');
            host.innerHTML = PRED_SORTS.map(s => {
                const on = s.key === predState.sortKey;
                const ar = on ? `<span class="ar">${predState.sortDir === 'asc' ? '▲' : '▼'}</span>` : '';
                return `<button class="sortbtn${on ? ' on' : ''}" data-k="${s.key}" data-d="${s.dir}">${s.label}${ar}</button>`;
            }).join('');
            host.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
                const k = b.dataset.k;
                if (predState.sortKey === k) {
                    predState.sortDir = predState.sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    predState.sortKey = k;
                    predState.sortDir = b.dataset.d;
                }
                renderPredictions();
            }));
        }

        function renderPredMeta() {
            const host = $('#predMeta');
            const v = currentVenue();
            const r = currentRace();
            if (!r) { host.innerHTML = ''; return; }
            const irukaNa = (predState.data && predState.data.iruka_available === false)
                ? '<span class="iruka-na">★イルカ未取得</span>' : '';
            const dist = r.distance ? (r.track + r.distance + 'm') : (r.track || '');
            host.innerHTML =
                `<span class="rno">${v.venue} ${r.race_number}R</span>` +
                `<span>${r.post_time || '--:--'} 発走</span>` +
                `<span>${dist}</span>` +
                `<span>${r.horses.length}頭</span>` + irukaNa;
        }

        function sortHorses(horses) {
            const k = predState.sortKey;
            const sign = predState.sortDir === 'asc' ? 1 : -1;
            return horses.slice().sort((a, b) => {
                const av = a[k], bv = b[k];
                const an = (av == null), bn = (bv == null);
                if (an && bn) return a.umaban - b.umaban;
                if (an) return 1;   // 欠損は常に末尾
                if (bn) return -1;
                if (av === bv) return a.umaban - b.umaban;
                return (av < bv ? -1 : 1) * sign;
            });
        }

        function renderPredTable() {
            const host = $('#predBody');
            const r = currentRace();
            if (!r) { host.innerHTML = ''; return; }
            // 指標ごとに「順位(1位=最大値)」を算出
            const rankMap = (key) => {
                const ranked = r.horses.filter(h => h[key] != null)
                    .slice().sort((a, b) => b[key] - a[key]);
                const m = new Map();
                ranked.forEach((h, i) => m.set(h.umaban, i + 1));
                return m;
            };
            const phRank = rankMap('pharaoh_winrate');
            const yoRank = rankMap('yoshi_winrate');
            const evCell = v => (v == null) ? '<span class="bar-na">—</span>'
                : `<span class="${v >= 1 ? 'ev-good' : ''}">${v.toFixed(2)}</span>`;
            const rows = sortHorses(r.horses).map(h => `
        <tr>
          <td class="col-uma"><span class="uma-badge">${h.umaban}</span></td>
          <td class="col-name"><span class="hname">${h.horse_name || ''}</span></td>
          <td class="jockey">${h.jockey || ''}</td>
          <td>${h.iruka ? '<span class="iruka-star">★</span>' : '<span class="mk-none">·</span>'}</td>
          <td class="bar-cell">${barHtml(h.pharaoh_winrate, 'ph', phRank.get(h.umaban))}</td>
          <td class="bar-cell">${barHtml(h.yoshi_winrate, 'yo', yoRank.get(h.umaban))}</td>
          <td>${h.tan_odds == null ? '—' : h.tan_odds.toFixed(1)}</td>
          <td>${evCell(h.tan_ev)}</td>
          <td>${evCell(h.fuku_ev)}</td>
          <td>${markHtml(h.mark_sou)}</td>
          <td>${markHtml(h.mark_teki)}</td>
          <td>${markHtml(h.mark_kai)}</td>
          <td>${markHtml(h.mark_soku)}</td>
        </tr>`).join('');
            host.innerHTML = `
      <table class="pred-table">
        <thead><tr>
          <th class="col-uma">馬番</th>
          <th class="col-name">馬名</th>
          <th>騎手</th>
          <th>★</th>
          <th class="bar-cell" style="color:var(--pharaoh)">勝馬率</th>
          <th class="bar-cell" style="color:var(--yoshi)">単勝率</th>
          <th>単オ</th><th>単EV</th><th>複EV</th>
          <th>総</th><th>的</th><th>回</th><th>速</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
        }

        function renderPredictions() {
            const emptyEl = $('#predEmpty');
            const clear = () => {
                $('#predVenues').innerHTML = ''; $('#predRaces').innerHTML = '';
                $('#predMeta').innerHTML = ''; $('#predSorts').innerHTML = '';
                $('#predBody').innerHTML = '';
            };
            if (predState.loading && predState.data === undefined) {
                clear();
                emptyEl.textContent = '読み込み中…';
                emptyEl.style.display = 'flex';
                return;
            }
            const vs = (predState.data && predState.data.venues) || [];
            if (!vs.length) {
                clear();
                emptyEl.textContent = '本日の予測データはありません';
                emptyEl.style.display = 'flex';
                return;
            }
            emptyEl.style.display = 'none';
            renderVenueChips();
            renderRaceNav();
            renderRaceChips();
            renderSortRow();
            renderPredMeta();
            renderPredTable();
        }

        /* ---------- 上位タブ切替 ---------- */
        function switchTab(name) {
            const isPred = (name === 'predictions');
            if (!isPred) document.body.classList.remove('pred-fs');
            $('#app').classList.toggle('is-hidden', isPred);
            $('#screenPredictions').classList.toggle('is-hidden', !isPred);
            $('#twFab').classList.toggle('is-hidden', isPred);
            $('#tabTickets').classList.toggle('on', !isPred);
            $('#tabPredictions').classList.toggle('on', isPred);
            if (isPred && predState.data === undefined && !predState.loading) loadPredictions();
        }
        function bindTabs() {
            $('#tabTickets').addEventListener('click', () => switchTab('tickets'));
            $('#tabPredictions').addEventListener('click', () => switchTab('predictions'));
            $('#predFsBtn').addEventListener('click', () => document.body.classList.add('pred-fs'));
            $('#predFsExit').addEventListener('click', () => document.body.classList.remove('pred-fs'));
            $('#prevRaceBtn').addEventListener('click', () => gotoRaceDelta(-1));
            $('#nextRaceBtn').addEventListener('click', () => gotoRaceDelta(+1));
        }

        /* ---------- init ---------- */
        window.addEventListener('load', async () => {
            bindTweaks();
            bindTabs();
            await load();
            updateClock();
            setInterval(() => { updateClock(); autoSkipCheck(); renderNav(); }, 30000);
            setInterval(() => { updateClock(); }, 1000);
            flashClock();
        });
    </script>
</body>

</html>
